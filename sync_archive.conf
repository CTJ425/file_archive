# ============================================================================
# sync_archive.conf — sync_archive.sh 的設定檔
# 這個檔案會被主腳本以 "source" 方式讀入，因此請維持 shell 變數語法。
# 部署到 NAS 後，請依實際環境修改下列路徑與參數。
# ============================================================================

# --- 路徑設定 -----------------------------------------------------------------

# 來源：A PC 分享夾在 NAS 上的 CIFS 掛載點（用 `mount | grep -i cifs` 查詢真實路徑）
# 範例：/volume1/ipcam_remote
SRC="/home/ivan/file_archive/src_dir/"

# 目的：NAS 本機封存根目錄（會鏡射來源的目錄樹）
DST="/home/ivan/file_archive/dst_dir/"

# log 存放目錄
LOG_DIR="/home/ivan/file_archive/logs_dir"

# --- 行為參數 -----------------------------------------------------------------

# 是否要求 SRC 必須是掛載點：
#   1 = 要求（CIFS 掛載部署建議開啟：分享夾沒掛上時掛載點只是空目錄，
#       不擋下來會誤以為「沒東西可搬」而靜默空轉）
#   0 = 不要求，SRC 為本機資料夾也可執行 ← 預設
REQUIRE_MOUNTPOINT=0

# 封存基準日：以檔案 mtime（修改時間）判斷，只搬「基準日 00:00 之前」的檔。
# 基準日 = 今天往前推 ARCHIVE_BEFORE_DAYS_AGO 天。
#   0 = 今天 00:00 之前都封存（＝昨天及更早），今天產生中的檔完全不動 ← 預設
#       例：今天 7/23 → 只封存 7/22 及更早的檔
#   1 = 保留今天與昨天，只封存前天及更早
ARCHIVE_BEFORE_DAYS_AGO=0

# NAS 端保留天數：$DST 上 mtime 超過此天數的檔案會被刪除（一年 = 365）
RETENTION_DAYS=365

# log 自我保留天數：logs 目錄下超過此天數的 sync_*.log 會被清理
LOG_RETENTION_DAYS=90

# 演練模式：1 = 只列出將要搬移/刪除的清單，不真的動檔；0 = 實際執行
DRY_RUN=0

# 失敗時是否發送 DSM 通知（1 = 是，需要 DSM 已設定通知；0 = 否）
NOTIFY_ON_ERROR=1
